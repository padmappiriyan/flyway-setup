# This workflow automates the build and deployment of the Flyway Manager Java application to AWS Lambda.
# It uses OIDC (OpenID Connect) for secure, passwordless authentication with AWS.

name: Build & Deploy Flyway Manager

on:
  push:
    branches: [main] # Trigger the deployment whenever code is pushed to the main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # Permissions required for OIDC authentication and reading repository content
    permissions:
      id-token: write # Required to request an OIDC JWT token from GitHub
      contents: read  # Required to checkout the source code

    steps:
      # Step 1: Download the source code from your GitHub repository
      - uses: actions/checkout@v4

      # Step 2: Set up a Java 21 environment
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      # NEW: Detect which files changed
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v42

      # Step 3: Compile only if Java source or pom.xml changed
      - name: Build fat JAR
        if: contains(steps.changed-files.outputs.all_changed_files, 'src/main/java/') || contains(steps.changed-files.outputs.all_changed_files, 'pom.xml')
        run: mvn clean package -q

      # Step 4: Authenticate with AWS
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Step 5: Update Lambda ONLY if Java/Pom changed (Optimized!)
      - name: Deploy to Lambda
        if: contains(steps.changed-files.outputs.all_changed_files, 'src/main/java/') || contains(steps.changed-files.outputs.all_changed_files, 'pom.xml')
        run: |
          aws lambda update-function-code \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb://target/flyway-manager-1.0.0.jar

      # Step 6: Extract Version from POM
      - name: Extract Version
        id: version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "PROJECT_VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # Step 7: Sync SQL migration and rollback scripts to VERSIONED path
      # We sync the entire db/ folder to s3://<bucket>/<VERSION>/
      # This creates s3://<bucket>/<VERSION>/migration/ and s3://<bucket>/<VERSION>/rollback/
      - name: Sync SQL Migrations and Rollbacks to S3
        run: |
          aws s3 sync src/main/resources/db/ s3://${{ secrets.S3_MIGRATION_BUCKET }}/${{ env.PROJECT_VERSION }}/ --delete

      # Step 8: Run Migration pointing to the NEW VERSION folder
      - name: Run Migration
        run: |
          aws lambda invoke \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --payload "{\"dbSelector\": \"aws-prod\", \"action\": \"migrate\", \"migrationLocation\": \"s3://${{ secrets.S3_MIGRATION_BUCKET }}/${{ env.PROJECT_VERSION }}/migration/\"}" \
            --cli-binary-format raw-in-base64-out \
            response.json
          cat response.json
