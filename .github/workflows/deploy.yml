# This workflow automates the build and deployment of the Flyway Manager Java application to AWS Lambda.
# It uses OIDC (OpenID Connect) for secure, passwordless authentication with AWS.

name: Build & Deploy Flyway Manager

on:
  push:
    branches: [main] # Trigger the deployment whenever code is pushed to the main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # Permissions required for OIDC authentication and reading repository content
    permissions:
      id-token: write # Required to request an OIDC JWT token from GitHub
      contents: read  # Required to checkout the source code

    steps:
      # Step 1: Download the source code from your GitHub repository
      - uses: actions/checkout@v4

      # Step 2: Set up a Java 21 environment using the Amazon Corretto distribution
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      # Step 3: Compile the code and create a 'Fat JAR' containing all dependencies
      # The -q flag keeps the logs clean by only showing errors/warnings
      - name: Build fat JAR
        run: mvn clean package -q

      # Step 4: Authenticate with AWS using the OIDC Role
      # This provides temporary, short-lived credentials for the deployment
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Step 5: Upload the newly built JAR file to your AWS Lambda function
      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb://target/flyway-manager-1.0.0.jar

      # Step 6: Sync SQL migration scripts to S3 (Separated storage)
      - name: Sync SQL Migrations to S3
        run: |
          aws s3 sync src/main/resources/db/migration/ s3://${{ secrets.S3_MIGRATION_BUCKET }}/scripts/ --delete

      # Step 7: Automatically trigger the migration using the S3 location
      - name: Run Migration
        run: |
          aws lambda invoke \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --payload '{"dbSelector": "aws-prod", "action": "migrate", "migrationLocation": "s3:${{ secrets.S3_MIGRATION_BUCKET }}/scripts/"}' \
            --cli-binary-format raw-in-base64-out \
            response.json
          cat response.json
